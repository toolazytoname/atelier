<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="atelier — a disposable Linux dev sandbox for Claude Code">
  <title>atelier — run Claude Code in a disposable Linux VM</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
  </g>

  <!-- logo tile (centered vertically: top = (630-400)/2 = 115) -->
  <g transform="translate(100, 115)">
    <rect width="400" height="400" rx="64" fill="url(#tile)" stroke="#334155" stroke-width="3"/>
    <!-- "A" letterform scaled for the 400px tile -->
    <path d="M104 312 L200 112 L296 312"
          stroke="#e2e8f0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M136 248 L264 248"
          stroke="#e2e8f0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- workshop spark in the upper-right corner -->
    <circle cx="320" cy="88" r="18" fill="#f59e0b"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="560" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="148" font-weight="700" fill="url(#wordmark)" letter-spacing="-5">atelier</text>

  <text x="564" y="346"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="34" font-weight="500" fill="#cbd5e1">A disposable Linux dev sandbox for Claude Code</text>

  <text x="564" y="402"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8">Run CC in a VM · Yolo safely · Host stays inert</text>

  <!-- accent corner mark (mirrors banner.svg) -->
  <g transform="translate(1080, 60)">
    <rect width="60" height="60" rx="14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <circle cx="30" cy="30" r="7" fill="#f59e0b"/>
  </g>

  <!-- footer hint: hostname-style URL so it reads as a real product -->
  <text x="564" y="540"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="20" font-weight="400" fill="#64748b">github.com/toolazytoname/atelier</text>
</svg>