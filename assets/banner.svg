<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="atelier — a disposable Linux dev sandbox for Claude Code">
  <title>atelier</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="75"  x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- logo tile -->
  <g transform="translate(80, 50)">
    <rect width="200" height="200" rx="44" fill="#0b1220" stroke="#1e293b" stroke-width="2"/>
    <path d="M52 156 L100 56 L148 156" stroke="#e2e8f0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M68 124 L132 124" stroke="#e2e8f0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="160" cy="44" r="9" fill="#f59e0b"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="340" y="170"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="120" font-weight="700" fill="url(#wordmark)" letter-spacing="-4">atelier</text>

  <text x="344" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8">A disposable Linux dev sandbox for Claude Code</text>

  <!-- accent corner mark -->
  <g transform="translate(1100, 60)">
    <rect width="60" height="60" rx="14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <circle cx="30" cy="30" r="6" fill="#f59e0b"/>
  </g>
</svg>
