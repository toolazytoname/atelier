# feature-spec.yaml — atelier harness-demo spec
#
# This file is the input to the GENERATOR agent. The orchestrator
# (orchestrate.py) reads it and passes the contents to the generator's
# prompt. Keep it concrete: every acceptance criterion is something
# a reviewer can verify by reading the code or running the tests.

feature: slugify
goal: |
  Add a `slugify(text: str) -> str` function to `demo/slugify.py` that
  converts arbitrary user text to a URL-safe slug, plus a pytest suite
  in `demo/test_slugify.py` that exercises every acceptance criterion.

acceptance:
  - Output is fully lowercase.
  - Whitespace runs (spaces, tabs, any Unicode whitespace) collapse to a
    single dash.
  - After lowercasing, any character that is not [a-z0-9-] is stripped
    (punctuation, symbols, emoji, control chars).
  - Leading and trailing dashes are trimmed.
  - An all-empty result is the empty string, not `"-"`.
  - ASCII-fold common Latin diacritics via stdlib only
    (`"café"` → `"cafe"`, `"naïve"` → `"naive"`).
  - No third-party dependencies. stdlib + pytest only.

tests:
  - id: simple
    input: "Hello World"
    expected: "hello-world"
  - id: punctuation
    input: "Hello, World!"
    expected: "hello-world"
  - id: whitespace
    input: "foo   bar\tbaz"
    expected: "foo-bar-baz"
  - id: unicode-diacritics
    input: "café — naïve résumé"
    expected: "cafe-naive-resume"
  - id: leading-trailing
    input: "  ---foo---  "
    expected: "foo"
  - id: empty
    input: ""
    expected: ""
  - id: only-strippable
    input: "!@#$%"
    expected: ""

constraints:
  files:
    - demo/slugify.py        # the implementation
    - demo/__init__.py       # makes `demo` a package
    - demo/test_slugify.py   # the pytest suite
  runner: pytest
  python: ">=3.10"
  no_third_party: true      # stdlib only for the implementation

reviewers:
  - name: correctness
    lens: "Does the code do what the spec says? Are all acceptance criteria met? Try the test cases by hand."
  - name: security
    lens: "Any injection vectors (none expected here, but check), unsafe defaults, hardcoded secrets, dependency CVEs?"
  - name: boundary
    lens: "What happens with None, very long input, every Unicode category, RTL text, deeply nested whitespace, embedded nulls?"
  - name: test
    lens: "Do the tests actually run and pass under pytest? Are they meaningful (not `assert True`)? Do they cover the spec's edge cases?"