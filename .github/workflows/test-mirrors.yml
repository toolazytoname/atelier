name: Test mirrors

on:
  push:
    paths:
      - 'setup/provision.sh'
      - '.github/workflows/test-mirrors.yml'
  pull_request:
    paths:
      - 'setup/provision.sh'
      - '.github/workflows/test-mirrors.yml'

permissions:
  contents: read

jobs:
  static-mirror-check:
    name: Verify both CN and international URL branches exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: bash -n for both CN_MIRROR values
        # provision.sh uses runtime CN_MIRROR — both branches are
        # always in the parse tree. A successful `bash -n` confirms
        # neither branch has a syntax error.
        run: |
          set -euo pipefail
          CN_MIRROR=1 bash -n setup/provision.sh
          CN_MIRROR=0 bash -n setup/provision.sh

      - name: shellcheck on provision.sh
        run: shellcheck setup/provision.sh

      - name: Both URL branches must be reachable (international)
        # The international branch must point to real, well-known hosts.
        # We only HEAD-check; we don't install anything.
        run: |
          set -euo pipefail
          for url in \
            "https://deb.nodesource.com" \
            "https://download.docker.com" \
            "https://github.com" \
            "https://crates.io" \
            "https://proxy.golang.org" \
            "https://pypi.org"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 -I "$url" || echo "000")
            if [ "$code" = "000" ] || [ "$code" -ge 400 ]; then
              echo "international mirror unreachable: $url (status=$code)"
              exit 1
            fi
            echo "  OK  $url ($code)"
          done

      - name: Both URL branches must be reachable (mainland China)
        run: |
          set -euo pipefail
          for url in \
            "https://mirrors.tuna.tsinghua.edu.cn" \
            "https://registry.npmmirror.com" \
            "https://goproxy.cn" \
            "https://rsproxy.cn" \
            "https://ghfast.top"; do
            code=$(curl -s -o /dev/null -w "%{_http_code}" -L --max-time 15 -I "$url" || echo "000")
            if [ "$code" = "000" ] || [ "$code" -ge 400 ]; then
              echo "CN mirror unreachable: $url (status=$code)"
              exit 1
            fi
            echo "  OK  $url ($code)"
          done

      - name: International config preview
        run: |
          CN_MIRROR=0 bash -c 'set -a; source setup/provision.sh --print-only 2>/dev/null || true; set +a' || true
          echo "(intl) CN_MIRROR resolves to: ${CN_MIRROR:-unset}"

  real-install-dry-run:
    name: Container smoke (no install, just env probe)
    runs-on: ubuntu-latest
    # This job is a static smoke — we do not run the full install in CI
    # because (a) it takes 5+ minutes, (b) it pulls hundreds of MB,
    # (c) the real path is exercised in the VM by users + maintainers.
    # The local-equivalent command is:
    #   CN_MIRROR=0 sudo docker run --rm -v "$PWD":/atelier \
    #     -w /atelier ubuntu:24.04 bash setup/provision.sh
    steps:
      - uses: actions/checkout@v4

      - name: Confirm provision.sh honours CN_MIRROR=0
        run: |
          set -euo pipefail
          grep -q "^CN_MIRROR=" setup/provision.sh
          grep -q "CN_MIRROR=0" setup/provision.sh || \
            grep -q 'CN_MIRROR:-0}' setup/provision.sh || \
            grep -q 'CN_MIRROR="${CN_MIRROR' setup/provision.sh
          echo "OK: CN_MIRROR variable is respected"

      - name: Static check — every apt source has a CN branch
        # Each 'add-apt-repository' / 'apt source' / 'curl ... install'
        # line in provision.sh must be reachable in both branches.
        # This is a heuristic — it doesn't catch every case but it
        # catches the most common regression (someone removing the
        # international branch).
        run: |
          set -euo pipefail
          if ! grep -qE 'CN_MIRROR.*0|deb.nodesource.com|download.docker.com' setup/provision.sh; then
            echo "provision.sh may be missing the international URL branch"; exit 1
          fi
          if ! grep -qE 'tuna.tsinghua|npmmirror|goproxy.cn|rsproxy.cn|ghfast' setup/provision.sh; then
            echo "provision.sh may be missing the CN mirror branch"; exit 1
          fi
          echo "OK: both CN and international URL branches present"
